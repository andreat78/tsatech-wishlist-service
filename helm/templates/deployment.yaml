apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    app: {{ include "app.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "app.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "app.name" . }}
    spec:
      containers:
        - name: {{ include "app.name" . }}
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "app.fullname" . }}-config
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretName" $ }}
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretName" $ }}
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretName" $ }}
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretName" $ }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretName" $ }}
                  key: DB_PASSWORD

{{- if not (hasKey .Values.env "SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE") }}
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
{{- end }}
{{- if not (hasKey .Values.env "SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE") }}
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "0"
{{- end }}
{{- if not (hasKey .Values.env "SPRING_FLYWAY_BASELINE_ON_MIGRATE") }}
            - name: SPRING_FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
{{- end }}
{{- if not (hasKey .Values.env "SPRING_FLYWAY_BASELINE_VERSION") }}
            - name: SPRING_FLYWAY_BASELINE_VERSION
              value: "0"
{{- end }}
{{- if not (hasKey .Values.env "SPRING_FLYWAY_TABLE") }}
            - name: SPRING_FLYWAY_TABLE
              value: 'flyway_{{ include "app.name" . | replace "-" "_" }}'
{{- end }}

{{- if .Values.secretEnv }}
{{- range $key, $value := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretName" $ }}
                  key: {{ default $key $value }}
{{- end }}
{{- end }}
{{- if .Values.truststore.enabled }}
            - name: JAVA_TOOL_OPTIONS
              value: "-Djavax.net.ssl.trustStore={{ .Values.truststore.mountPath }}/truststore.jks -Djavax.net.ssl.trustStorePassword={{ .Values.truststore.password }}"
{{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.service.port }}
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.service.port }}
              scheme: HTTPS
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          volumeMounts:
{{- if .Values.truststore.enabled }}
            - name: truststore
              mountPath: {{ .Values.truststore.mountPath }}
              readOnly: true
{{- end }}
{{- if .Values.tls.enabled }}
            - name: service-tls
              mountPath: /etc/tls
              readOnly: true
{{- end }}
      volumes:
{{- if .Values.truststore.enabled }}
        - name: truststore
          secret:
            secretName: {{ .Values.truststore.secretName }}
{{- end }}
{{- if .Values.tls.enabled }}
        - name: service-tls
          secret:
            secretName: {{ .Values.tls.secretName }}
{{- end }}
